<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C-Mastery Journey</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap"
    rel="stylesheet">
  <!-- PrismJS for Syntax Highlighting (Okaidia Theme fits the hacker aesthetic) -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
  <!-- PeerJS for Real-time Collaboration -->
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            lab: {
              bg: '#05070b',
              panel: 'rgba(12, 22, 38, 0.92)',
              panelDeep: 'rgba(8, 14, 24, 0.98)',
              line: 'rgba(217, 231, 255, 0.14)',
              fg: '#d9e7ff',
              muted: 'rgba(217, 231, 255, 0.55)',
              cyan: '#24f6ff',
              green: '#20ff7a',
            },
          },
        },
      },
    }
  </script>
  <style>
    body {
      background-color: #05070b;
      color: #d9e7ff;
      background-image:
        radial-gradient(1200px 650px at 20% -10%, rgba(36, 246, 255, 0.14), transparent 55%),
        radial-gradient(900px 500px at 85% 15%, rgba(32, 255, 122, 0.1), transparent 52%),
        radial-gradient(800px 450px at 50% 85%, rgba(36, 246, 255, 0.06), transparent 60%);
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(12, 22, 38, 0.9);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(36, 246, 255, 0.25);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(36, 246, 255, 0.4);
    }

    /* Override Prism background to be transparent to match our editor container */
    pre[class*="language-"] {
      background: transparent !important;
      text-shadow: none !important;
      margin: 0 !important;
      padding: 0 !important;
    }

    code[class*="language-"],
    pre[class*="language-"] {
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 0.875rem !important;
      /* text-sm */
      line-height: 1.5rem !important;
      /* leading-6 */
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  } 
}
</script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
